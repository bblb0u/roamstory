<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>旅行足迹</title>
    <meta name="description" content="旅行足迹地图与相册" />
    <link rel="icon" href="favicon.svg" />
    <link rel="stylesheet" href="https://registry.npmmirror.com/lxgw-wenkai-screen-web/1.522.0/files/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@6/dist/echarts.min.js"></script>
    <style>
      :root {
        --ink: #1f2328;
        --muted: #687076;
        --blue: #2761ad;
        --red: #d84d4d;
      }

      *, *::before, *::after { box-sizing: border-box; }

      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: "LXGW WenKai Screen", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        background: #fff;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }

      a { text-decoration: none; color: inherit; }
      button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* ---------- Navbar ---------- */
      .navbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 50;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid #f3f4f6;
      }
      .navbar__brand {
        font-size: 16px;
        font-weight: 700;
        color: #111827;
      }
      .navbar__links {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 14px;
      }
      .navbar__link {
        padding: 6px 12px;
        border-radius: 6px;
        color: #6b7280;
        transition: color 0.15s, background-color 0.15s;
      }
      .navbar__link:hover { color: var(--blue); }
      .navbar__link.is-active {
        background: #111827;
        color: #fff;
      }

      /* ---------- Views ---------- */
      .view { display: none; }
      .view.is-active { display: block; }

      /* ---------- Map ---------- */
      .map-section {
        position: fixed;
        left: 0; right: 0;
        top: 56px; bottom: 0;
        background: #eef1f3;
        overflow: hidden;
      }
      .map-chart { width: 100%; height: 100%; }

      .map-loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .map-loading__inner {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #9ca3af;
        font-size: 14px;
      }
      .map-loading__spinner {
        width: 16px;
        height: 16px;
        border: 2px solid #d1d5db;
        border-top-color: var(--blue);
        border-radius: 9999px;
        animation: spin 0.8s linear infinite;
      }

      .map-card {
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        border: 1px solid #f3f4f6;
      }
      .map-legend {
        top: 16px; left: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 10px 12px;
        font-size: 12px;
        color: #6b7280;
      }
      .map-legend span { display: flex; align-items: center; gap: 8px; }
      .dot {
        width: 10px; height: 10px;
        border-radius: 9999px;
        flex-shrink: 0;
      }
      .dot--red { background: var(--red); }
      .dot--gray { background: #9aa7b4; }

      .map-stats {
        bottom: 16px; left: 16px;
        padding: 10px 16px;
      }
      .map-stats__label { font-size: 12px; color: #9ca3af; }
      .map-stats__value {
        font-size: 18px;
        font-weight: 600;
        color: #111827;
      }
      .map-stats__unit {
        font-size: 14px;
        font-weight: 400;
        color: #9ca3af;
      }

      /* ---------- Album ---------- */
      .album {
        padding: 80px 24px 64px;
        background: #fff;
        min-height: 100vh;
      }
      .album__inner { max-width: 1024px; margin: 0 auto; }
      .album__head { text-align: center; margin-bottom: 48px; }
      .album__title {
        font-size: 24px;
        font-weight: 700;
        color: #111827;
        margin: 0;
      }
      .album__sub {
        font-size: 14px;
        color: #9ca3af;
        margin: 8px 0 0;
      }

      .album__list { display: flex; flex-direction: column; gap: 40px; }

      .place {
        scroll-margin-top: 80px;
        border-radius: 12px;
        transition: all 0.5s;
      }
      .place.is-highlight {
        box-shadow: 0 0 0 2px rgba(216, 77, 77, 0.5);
        background: rgba(254, 242, 242, 0.4);
        margin: 0 -12px;
        padding: 12px;
      }
      .place__head {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 12px;
      }
      .place__name {
        font-size: 16px;
        font-weight: 500;
        color: #374151;
        margin: 0;
      }
      .place__count { font-size: 12px; color: #9ca3af; }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .thumb {
        display: block;
        overflow: hidden;
        border-radius: 8px;
        background: #f3f4f6;
        aspect-ratio: 4 / 3;
        position: relative;
      }
      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s;
        display: block;
      }
      .thumb:hover img { transform: scale(1.05); }
      .thumb__overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0);
        transition: background-color 0.15s;
      }
      .thumb:hover .thumb__overlay { background: rgba(0, 0, 0, 0.1); }

      /* ---------- Lightbox ---------- */
      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(4px);
        display: flex;
        flex-direction: column;
        animation: fadeIn 0.2s ease-out;
      }
      .lightbox__top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        height: 56px;
        flex-shrink: 0;
        color: rgba(255, 255, 255, 0.9);
      }
      .lightbox__title { display: flex; align-items: baseline; gap: 8px; }
      .lightbox__place { font-size: 16px; font-weight: 500; }
      .lightbox__counter {
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        font-variant-numeric: tabular-nums;
      }
      .lightbox__close {
        width: 36px; height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 24px;
        line-height: 1;
        transition: color 0.15s, background-color 0.15s;
      }
      .lightbox__close:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.1);
      }

      .lightbox__main {
        flex: 1;
        min-height: 0;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
      }
      .lightbox__img {
        max-height: 100%;
        max-width: 100%;
        object-fit: contain;
        border-radius: 8px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        animation: fadeIn 0.25s ease-out;
      }
      .lightbox__nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 44px; height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 24px;
        backdrop-filter: blur(8px);
        transition: background-color 0.2s;
      }
      .lightbox__nav:hover { background: rgba(255, 255, 255, 0.2); }
      .lightbox__nav--prev { left: 8px; }
      .lightbox__nav--next { right: 8px; }

      .lightbox__strip {
        flex-shrink: 0;
        display: flex;
        justify-content: center;
        gap: 8px;
        padding: 16px;
        overflow-x: auto;
      }
      .lightbox__thumb {
        flex-shrink: 0;
        width: 64px; height: 48px;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 0 0 2px transparent;
        opacity: 0.5;
        transition: opacity 0.2s, box-shadow 0.2s;
      }
      .lightbox__thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .lightbox__thumb:hover { opacity: 0.9; }
      .lightbox__thumb.is-active {
        box-shadow: 0 0 0 2px #fff;
        opacity: 1;
      }

      body.no-scroll { overflow: hidden; }

      @media (min-width: 768px) {
        .grid { gap: 12px; }
        .lightbox__top { padding: 0 32px; }
        .lightbox__nav--prev { left: 24px; }
        .lightbox__nav--next { right: 24px; }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="#/map" class="navbar__brand">旅行足迹</a>
      <div class="navbar__links">
        <a href="#/map" class="navbar__link" data-route="map">足迹</a>
        <a href="#/album" class="navbar__link" data-route="album">相册</a>
      </div>
    </nav>

    <!-- 足迹地图 -->
    <section class="view" id="view-map">
      <div class="map-section">
        <div class="map-chart" id="map-chart"></div>

        <div class="map-loading" id="map-loading">
          <div class="map-loading__inner">
            <span class="map-loading__spinner"></span>
            地图加载中…
          </div>
        </div>

        <div class="map-card map-legend">
          <span><span class="dot dot--red"></span> 有相册（可点击）</span>
          <span><span class="dot dot--gray"></span> 到过</span>
        </div>

        <div class="map-card map-stats">
          <div class="map-stats__label">足迹</div>
          <div class="map-stats__value">
            <span id="map-count">0</span> <span class="map-stats__unit">座城市</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 相册 -->
    <section class="view" id="view-album">
      <div class="album">
        <div class="album__inner">
          <div class="album__head">
            <h2 class="album__title">相册</h2>
            <p class="album__sub"><span id="album-place-count">0</span> 个地点 · 点击地图红点可定位</p>
          </div>
          <div class="album__list" id="album-list"></div>
        </div>
      </div>
    </section>

    <script>
      // ===================== 旅行数据 =====================
      // 数据源自 blog.canghai.org/travel
      const places = [

        { name: '泸沽湖', latLng: [27.722235, 100.910329] },

        { name: '三清山', latLng: [28.911597, 118.076681] },
        { name: '上饶', latLng: [28.699725, 117.077423] },
        { name: '南昌', latLng: [28.680175, 115.910978] },
        { name: '康定', latLng: [30.050514, 101.963946] },
        { name: '新都桥', latLng: [30.033269, 101.509559] },
        { name: '雅江', latLng: [30.031498, 101.014366] },
        { name: '理塘', latLng: [29.994228, 100.269145] },

        { name: '察尔汗', latLng: [36.949738, 95.192077] },
        { name: '格尔木', latLng: [36.407272, 94.928293] },
        { name: '可可西里', latLng: [35.639114, 94.067003] },
        { name: '敦煌', latLng: [40.142141, 94.66201] },
        { name: '嘉峪关', latLng: [39.800827, 98.227762] },
        { name: '张掖', latLng: [38.924766, 100.449858] },
        { name: '祁连县', latLng: [38.177112, 100.253211] },
      ];

      // 相册：按地点分组，每个地点的风景照片
      const G = 'gallery';
      const gallery = [
        { place: '黄山', photos: [`${G}/lake-mountain.jpg`, `${G}/snow-mountain.jpg`, `${G}/mountain-road.jpg`] },
        { place: '大理', photos: [`${G}/old-town.jpg`, `${G}/lake-mountain.jpg`, `${G}/coast.jpg`] },
        { place: '丽江', photos: [`${G}/old-town.jpg`, `${G}/snow-mountain.jpg`, `${G}/highland-road.jpg`] },
        { place: '稻城亚丁', photos: [`${G}/highland-road.jpg`, `${G}/snow-mountain.jpg`, `${G}/lake-mountain.jpg`] },
        { place: '敦煌', photos: [`${G}/dunhuang-desert.jpg`, `${G}/highland-road.jpg`, `${G}/mountain-road.jpg`] },
        { place: '青海湖', photos: [`${G}/qinghai-lake.jpg`, `${G}/lake-mountain.jpg`, `${G}/highland-road.jpg`] },
        { place: '北京', photos: [`${G}/street.jpg`, `${G}/old-town.jpg`, `${G}/city-skyline.jpg`] },
        { place: '西安', photos: [`${G}/street.jpg`, `${G}/old-town.jpg`, `${G}/dunhuang-desert.jpg`] },
        { place: '厦门', photos: [`${G}/coast.jpg`, `${G}/city-skyline.jpg`, `${G}/street.jpg`] },
        { place: '上海', photos: [`${G}/city-skyline.jpg`, `${G}/hongkong-night.jpg`, `${G}/street.jpg`] },
        { place: '重庆', photos: [`${G}/chongqing-night.jpg`, `${G}/mountain-road.jpg`, `${G}/city-skyline.jpg`] },
        { place: '香港', photos: [`${G}/hongkong-night.jpg`, `${G}/city-skyline.jpg`, `${G}/coast.jpg`] },
        { place: '杭州', photos: [`${G}/lake-mountain.jpg`, `${G}/mountain-road.jpg`, `${G}/old-town.jpg`] },
        { place: '青州', photos: [`${G}/qilu-mountain.jpg`, `${G}/old-town.jpg`, `${G}/mountain-road.jpg`] },
      ];

      const PHOTO_PLACES = new Set(gallery.map((g) => g.place));

      // ===================== 路由 =====================
      const navLinks = document.querySelectorAll('.navbar__link');
      const views = {
        map: document.getElementById('view-map'),
        album: document.getElementById('view-album'),
      };

      let pendingFocus = null; // 点击地图红点后待定位的地点

      function currentRoute() {
        return window.location.hash.replace('#/', '') || 'map';
      }

      function applyRoute() {
        const route = currentRoute();
        const view = route === 'album' ? 'album' : 'map';

        Object.keys(views).forEach((key) => {
          views[key].classList.toggle('is-active', key === view);
        });
        navLinks.forEach((a) => {
          a.classList.toggle('is-active', a.dataset.route === view);
        });

        if (view === 'map') {
          // 地图容器在重新可见后可能需要重算尺寸
          if (chart) requestAnimationFrame(() => chart.resize());
        } else if (view === 'album' && pendingFocus) {
          const place = pendingFocus;
          pendingFocus = null;
          focusPlace(place);
        }
      }

      window.addEventListener('hashchange', applyRoute);

      function selectPlace(place) {
        pendingFocus = place;
        window.location.hash = '#/album';
      }

      // ===================== 地图 =====================
      const WORLD_CENTER = [0, 0];
      const WORLD_BOUNDS = [[-180, 90], [180, -90]];
      const MIN_ZOOM = 1;
      const MAX_ZOOM = 12;
      const FONT = '"LXGW WenKai Screen", "PingFang SC", "Microsoft YaHei", sans-serif';

      let chart = null;
      let resizeRaf = null;

      // 区域名改中文 + 南海诸岛归一化
      function normalizeMap(geoJson) {
        (geoJson.features || []).forEach((f) => {
          const p = f.properties || {};
          if (p.adchar === 'JD' || p.adcode === '100000_JD') {
            p.name = '南海诸岛';
          } else if (p.NAME_ZH) {
            p.name = p.NAME_ZH;
          }
          f.properties = p;
        });
      }

      const toPoint = (pl) => ({
        name: pl.name,
        value: [pl.latLng[1], pl.latLng[0]],
        hasPhoto: PHOTO_PLACES.has(pl.name),
      });

      function resetWorldView() {
        if (!chart) return;
        chart.setOption({ geo: { center: WORLD_CENTER, zoom: MIN_ZOOM } });
      }

      async function loadMap() {
        const res = await fetch('maps/world-china-detail.json');
        const geo = await res.json();
        normalizeMap(geo);
        echarts.registerMap('china-detail', geo);

        chart = echarts.init(document.getElementById('map-chart'), null, { renderer: 'canvas' });

        const withPhoto = places.filter((p) => PHOTO_PLACES.has(p.name)).map(toPoint);
        const withoutPhoto = places.filter((p) => !PHOTO_PLACES.has(p.name)).map(toPoint);

        chart.setOption({
          backgroundColor: 'transparent',
          textStyle: { fontFamily: FONT },
          tooltip: {
            trigger: 'item',
            borderWidth: 0,
            padding: [6, 10],
            backgroundColor: 'rgba(31,35,40,0.92)',
            textStyle: { color: '#fff', fontSize: 13, fontFamily: FONT },
            formatter: (p) => {
              if (p.componentType === 'series') {
                return p.data && p.data.hasPhoto ? `${p.data.name} · 点击看相册` : (p.data && p.data.name) || '';
              }
              return p.name || '';
            },
          },
          geo: {
            map: 'china-detail',
            roam: true,
            center: WORLD_CENTER,
            zoom: MIN_ZOOM,
            boundingCoords: WORLD_BOUNDS,
            left: 0, right: 0, top: 0, bottom: 0,
            preserveAspect: 'contain',
            scaleLimit: { min: MIN_ZOOM, max: MAX_ZOOM },
            label: { show: false },
            itemStyle: {
              areaColor: '#eef3f7',
              borderColor: '#c4d0dc',
              borderWidth: 0.75,
            },
            emphasis: {
              label: { show: false },
              itemStyle: { areaColor: '#dbeafe' },
            },
            select: { disabled: true },
            regions: [
              {
                name: '南海诸岛',
                itemStyle: { areaColor: 'rgba(216,77,77,0.05)', borderColor: '#8d9cac', borderWidth: 0.8 },
              },
            ],
          },
          series: [
            {
              name: '足迹',
              type: 'effectScatter',
              coordinateSystem: 'geo',
              zlevel: 2,
              data: withoutPhoto,
              symbol: 'circle',
              symbolSize: 8,
              showEffectOn: 'emphasis',
              rippleEffect: { number: 0 },
              itemStyle: { color: '#9aa7b4', borderColor: '#fff', borderWidth: 1.5 },
              emphasis: { scale: 1.5, itemStyle: { color: '#687076' } },
            },
            {
              name: '相册',
              type: 'effectScatter',
              coordinateSystem: 'geo',
              zlevel: 3,
              data: withPhoto,
              symbol: 'circle',
              symbolSize: 9,
              showEffectOn: 'emphasis',
              rippleEffect: { number: 0 },
              itemStyle: { color: '#d84d4d', borderColor: '#fff', borderWidth: 1.5 },
              emphasis: { scale: 1.4 },
            },
          ],
        });

        chart.on('click', (params) => {
          if (params.seriesName === '相册' && params.data && params.data.name) {
            selectPlace(params.data.name);
          }
        });
        chart.on('mouseover', (params) => {
          if (params.seriesName === '相册') chart.getZr().setCursorStyle('pointer');
        });
        chart.on('mouseout', () => chart.getZr().setCursorStyle('default'));
        chart.on('georoam', () => {
          const opt = chart.getOption();
          const zoom = opt && opt.geo && opt.geo[0] && opt.geo[0].zoom;
          if (zoom <= MIN_ZOOM + 0.001) resetWorldView();
        });

        window.addEventListener('resize', () => {
          if (resizeRaf) window.cancelAnimationFrame(resizeRaf);
          resizeRaf = window.requestAnimationFrame(() => {
            resizeRaf = null;
            chart.resize();
          });
        });

        document.getElementById('map-loading').style.display = 'none';
      }

      // ===================== 相册渲染 =====================
      const placeEls = {}; // place name -> 地点块 DOM

      function renderAlbum() {
        document.getElementById('map-count').textContent = String(places.length);
        document.getElementById('album-place-count').textContent = String(gallery.length);

        const list = document.getElementById('album-list');
        gallery.forEach((item) => {
          const block = document.createElement('div');
          block.className = 'place';

          const head = document.createElement('div');
          head.className = 'place__head';
          const h3 = document.createElement('h3');
          h3.className = 'place__name';
          h3.textContent = item.place;
          const count = document.createElement('span');
          count.className = 'place__count';
          count.textContent = `${item.photos.length} 张`;
          head.append(h3, count);

          const grid = document.createElement('div');
          grid.className = 'grid';
          item.photos.forEach((src, i) => {
            const btn = document.createElement('button');
            btn.className = 'thumb';
            btn.addEventListener('click', () => openViewer(item, i));

            const img = document.createElement('img');
            img.src = src;
            img.alt = item.place;
            img.loading = 'lazy';

            const overlay = document.createElement('span');
            overlay.className = 'thumb__overlay';

            btn.append(img, overlay);
            grid.append(btn);
          });

          block.append(head, grid);
          list.append(block);
          placeEls[item.place] = block;
        });
      }

      function focusPlace(place) {
        const el = placeEls[place];
        if (!el) return;
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.add('is-highlight');
        setTimeout(() => el.classList.remove('is-highlight'), 1600);
      }

      // ===================== Lightbox =====================
      let viewer = null; // { item, index }
      let lightboxEl = null;

      function openViewer(item, index) {
        viewer = { item, index };
        document.body.classList.add('no-scroll');
        renderViewer();
      }

      function closeViewer() {
        viewer = null;
        document.body.classList.remove('no-scroll');
        if (lightboxEl) {
          lightboxEl.remove();
          lightboxEl = null;
        }
      }

      function step(dir) {
        if (!viewer) return;
        const len = viewer.item.photos.length;
        viewer.index = (viewer.index + dir + len) % len;
        renderViewer();
      }

      function jump(index) {
        if (!viewer) return;
        viewer.index = index;
        renderViewer();
      }

      function preloadAdjacent() {
        if (!viewer) return;
        const { item, index } = viewer;
        [index + 1, index - 1].forEach((i) => {
          const src = item.photos[(i + item.photos.length) % item.photos.length];
          if (src) {
            const img = new Image();
            img.src = src;
          }
        });
      }

      function renderViewer() {
        if (!viewer) return;
        const { item, index } = viewer;
        const multi = item.photos.length > 1;

        if (!lightboxEl) {
          lightboxEl = document.createElement('div');
          lightboxEl.className = 'lightbox';
          lightboxEl.addEventListener('click', closeViewer); // 点击遮罩关闭
          document.body.append(lightboxEl);
        }
        lightboxEl.innerHTML = '';

        // 顶栏
        const top = document.createElement('div');
        top.className = 'lightbox__top';
        top.addEventListener('click', (e) => e.stopPropagation());
        const title = document.createElement('div');
        title.className = 'lightbox__title';
        const place = document.createElement('span');
        place.className = 'lightbox__place';
        place.textContent = item.place;
        const counter = document.createElement('span');
        counter.className = 'lightbox__counter';
        counter.textContent = `${index + 1} / ${item.photos.length}`;
        title.append(place, counter);
        const closeBtn = document.createElement('button');
        closeBtn.className = 'lightbox__close';
        closeBtn.setAttribute('aria-label', '关闭 (Esc)');
        closeBtn.textContent = '×';
        closeBtn.addEventListener('click', closeViewer);
        top.append(title, closeBtn);

        // 主图区
        const main = document.createElement('div');
        main.className = 'lightbox__main';
        const img = document.createElement('img');
        img.className = 'lightbox__img';
        img.src = item.photos[index];
        img.alt = item.place;
        img.addEventListener('click', (e) => e.stopPropagation());
        main.append(img);

        if (multi) {
          const prev = document.createElement('button');
          prev.className = 'lightbox__nav lightbox__nav--prev';
          prev.setAttribute('aria-label', '上一张 (←)');
          prev.textContent = '‹';
          prev.addEventListener('click', (e) => { e.stopPropagation(); step(-1); });
          const next = document.createElement('button');
          next.className = 'lightbox__nav lightbox__nav--next';
          next.setAttribute('aria-label', '下一张 (→)');
          next.textContent = '›';
          next.addEventListener('click', (e) => { e.stopPropagation(); step(1); });
          main.append(prev, next);
        }

        lightboxEl.append(top, main);

        // 底部缩略图条
        if (multi) {
          const strip = document.createElement('div');
          strip.className = 'lightbox__strip';
          strip.addEventListener('click', (e) => e.stopPropagation());
          item.photos.forEach((src, i) => {
            const btn = document.createElement('button');
            btn.className = 'lightbox__thumb' + (i === index ? ' is-active' : '');
            btn.addEventListener('click', () => jump(i));
            const timg = document.createElement('img');
            timg.src = src;
            timg.alt = '';
            btn.append(timg);
            strip.append(btn);
          });
          lightboxEl.append(strip);
        }

        preloadAdjacent();
      }

      window.addEventListener('keydown', (e) => {
        if (!viewer) return;
        if (e.key === 'Escape') closeViewer();
        else if (e.key === 'ArrowLeft') step(-1);
        else if (e.key === 'ArrowRight') step(1);
      });

      // ===================== 启动 =====================
      renderAlbum();
      applyRoute();
      loadMap();
    </script>
  </body>
</html>
